spring.application.name=stream-back

# stream
# \uAC1C\uBC1C \uBAA8\uB4DC \uC5EC\uBD80
soltech.stream.is-dev-mode=false
# \uBA54\uC138\uC9C0 \uC5B8\uC5B4
soltech.stream.msg.language=ko-KR
# 1 * 60 (\uCD08\uB2E8\uC704)
soltech.stream.msg.interval=60
soltech.stream.secret.key=[SECRET_KEY]
soltech.stream.secret.key.length=64
soltech.stream.secret.algorithm=AES
soltech.stream.jwt.key=[JWT_KEY]
# 24 * 60 (\uBD84\uB2E8\uC704)
soltech.stream.jwt.expire=1440
# 1 * 60 (\uCD08\uB2E8\uC704)
soltech.stream.authrt.interval=60
# \uD30C\uC77C \uACBD\uB85C
soltech.stream.file.absolute.path=[FILE_PATH]

# Server
server.port=8080
server.servlet.context-path=/

# \uD30C\uC77C
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=200MB
spring.servlet.multipart.max-request-size=200MB
spring.servlet.multipart.file-size-threshold=5MB
server.tomcat.max-http-form-post-size=200MB

# Database
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://[DBIP]:5432/[DBNAME]
#jdbc:postgresql://localhost:5432/[DBNAME]

spring.datasource.username=[DBUSER]
spring.datasource.password=[ENCRYPTED_DB_PASSWORD]
spring.sql.init.platform=postgresql

# JPA
spring.jpa.database=postgresql
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.default_schema=[DBSCHEMA]
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Seoul
#spring.jpa.packages-to-scan=kr.co.soltech.stream
spring.jpa.defer-datasource-initialization=true
spring.jpa.hibernate.ddl-auto=none
spring.data.jpa.repositories.enabled=true
spring.sql.init.mode=never
spring.sql.init.data-locations=classpath:/db/data.sql
spring.sql.init.schema-locations=classpath:/db/schema.sql

# Mybatis
mybatis.mapper-locations=classpath:/db/mapper/**/*-mapper.xml
spring.jackson.time-zone=Asia/Seoul

# Cache
spring.cache.jcache.config=classpath:ehcache.xml

# Log
logging.level.root=INFO
